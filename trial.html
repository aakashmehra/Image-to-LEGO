<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RTFKT Dunk - SHOb</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #e8e8e8 0%, #f5f5f5 100%);
            min-height: 100vh;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 60px;
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
        }

        .logo {
            width: 60px;
            height: 60px;
            background: #000;
            border-radius: 50%;
            position: relative;
            overflow: hidden;
        }

        .logo::after {
            content: '';
            position: absolute;
            width: 35px;
            height: 35px;
            background: #fff;
            border-radius: 50%;
            top: 8px;
            left: 15px;
            box-shadow: -8px 8px 0 #000;
        }

        .brand-name {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 42px;
            font-weight: 300;
            letter-spacing: 3px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .menu-icon {
            width: 24px;
            height: 24px;
            display: flex;
            flex-direction: column;
            gap: 5px;
            cursor: pointer;
        }

        .menu-icon span {
            width: 100%;
            height: 3px;
            background: #000;
            border-radius: 2px;
        }

        .cart-btn {
            padding: 12px 32px;
            border: 2px solid #000;
            border-radius: 30px;
            background: transparent;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .cart-btn:hover {
            background: #000;
            color: #fff;
        }

        .container {
            display: flex;
            padding: 40px 60px;
            gap: 60px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .sidebar {
            display: flex;
            gap: 30px;
        }

        .color-selector {
            display: flex;
            flex-direction: column;
            gap: 25px;
            padding: 30px 0;
        }

        .color-option {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
            position: relative;
        }

        .color-option::before {
            content: '';
            position: absolute;
            left: -15px;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid #000;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .color-option.active::before {
            opacity: 1;
        }

        .color-option:hover {
            transform: scale(1.1);
        }

        .color-light-gray { background: #d4d4d4; }
        .color-gray { background: #808080; }
        .color-black { background: #000; }
        .color-white { background: #fff; border-color: #ddd; }

        .size-selector {
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            border-radius: 40px;
            padding: 30px 20px;
        }

        .size-option {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: transparent;
            border: none;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }

        .size-option:hover {
            background: rgba(0, 0, 0, 0.1);
        }

        .size-option.active {
            background: #000;
            color: #fff;
        }

        .product-details {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 30px;
        }

        .product-title {
            font-size: 48px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .product-price {
            font-size: 48px;
            font-weight: 300;
        }

        .product-features {
            margin-bottom: 40px;
        }

        .product-features ul {
            list-style: none;
        }

        .product-features li {
            padding: 8px 0;
            font-size: 16px;
            color: #333;
            line-height: 1.6;
        }

        .product-features li::before {
            content: '•';
            margin-right: 10px;
            font-weight: bold;
        }

        .product-image-main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 30px;
        }

        .product-image-main img {
            max-width: 100%;
            height: auto;
            filter: drop-shadow(0 20px 40px rgba(0,0,0,0.2));
        }

        .product-thumbnails {
            display: flex;
            gap: 20px;
            margin-bottom: 40px;
            justify-content: center;
        }

        .thumbnail {
            width: 80px;
            height: 80px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.6);
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .thumbnail:hover {
            transform: scale(1.05);
            background: rgba(255, 255, 255, 0.9);
        }

        .thumbnail img {
            width: 90%;
            height: 90%;
            object-fit: contain;
        }

        .action-buttons {
            display: flex;
            gap: 20px;
            margin-bottom: 60px;
            justify-content: center;
        }

        .btn {
            padding: 20px 60px;
            border-radius: 50px;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid #000;
        }

        .btn-outline {
            background: transparent;
            color: #000;
        }

        .btn-outline:hover {
            background: rgba(0, 0, 0, 0.05);
            transform: translateY(-2px);
        }

        .btn-solid {
            background: #000;
            color: #fff;
        }

        .btn-solid:hover {
            background: #333;
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .footer {
            display: flex;
            justify-content: center;
            gap: 60px;
            padding: 40px;
        }

        .footer a {
            color: #333;
            text-decoration: none;
            font-size: 16px;
            transition: color 0.3s;
        }

        .footer a:hover {
            color: #000;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo"></div>
        <div class="brand-name">SHOb</div>
        <div class="header-right">
            <div class="menu-icon">
                <span></span>
                <span></span>
                <span></span>
            </div>
            <button class="cart-btn">Cart</button>
        </div>
    </div>

    <div class="container">
        <div class="sidebar">
            <div class="color-selector">
                <div class="color-option color-light-gray"></div>
                <div class="color-option color-gray"></div>
                <div class="color-option color-black active"></div>
                <div class="color-option color-white"></div>
            </div>

            <div class="size-selector">
                <button class="size-option">37</button>
                <button class="size-option">38</button>
                <button class="size-option">39</button>
                <button class="size-option">40</button>
                <button class="size-option active">41</button>
                <button class="size-option">42</button>
                <button class="size-option">43</button>
                <button class="size-option">44</button>
            </div>
        </div>

        <div class="product-details">
            <div class="product-header">
                <h1 class="product-title">RTFKT Dunk</h1>
                <div class="product-price">$229</div>
            </div>

            <div class="product-features">
                <ul>
                    <li>Custom fitted to the shape of your feet</li>
                    <li>Fused 3D lattice construction</li>
                    <li>Breathable, washable, odor resistant</li>
                    <li>100% recyclable and sweatshop-free</li>
                </ul>
            </div>

            <div class="product-image-main">
                <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 800 400'%3E%3Crect fill='%23f5f5f5' width='800' height='400'/%3E%3Ctext x='400' y='200' font-family='Arial' font-size='24' fill='%23999' text-anchor='middle'%3EProduct Image%3C/text%3E%3C/svg%3E" alt="RTFKT Dunk">
            </div>

            <div class="product-thumbnails">
                <div class="thumbnail">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e0e0' width='100' height='100'/%3E%3C/svg%3E" alt="View 1">
                </div>
                <div class="thumbnail">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e0e0' width='100' height='100'/%3E%3C/svg%3E" alt="View 2">
                </div>
                <div class="thumbnail">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e0e0' width='100' height='100'/%3E%3C/svg%3E" alt="View 3">
                </div>
                <div class="thumbnail">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e0e0' width='100' height='100'/%3E%3C/svg%3E" alt="View 4">
                </div>
                <div class="thumbnail">
                    <img src="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect fill='%23e0e0e0' width='100' height='100'/%3E%3C/svg%3E" alt="View 5">
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-outline">Add to cart</button>
                <button class="btn btn-solid">Buy now</button>
            </div>
        </div>
    </div>

    <div class="footer">
        <a href="#">Instagram</a>
        <a href="#">Contact</a>
        <a href="#">FAQ</a>
        <a href="#">Privacy policy</a>
    </div>

    <script>
        // Size selector functionality
        const sizeButtons = document.querySelectorAll('.size-option');
        sizeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                sizeButtons.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        // Color selector functionality
        const colorOptions = document.querySelectorAll('.color-option');
        colorOptions.forEach(opt => {
            opt.addEventListener('click', () => {
                colorOptions.forEach(o => o.classList.remove('active'));
                opt.classList.add('active');
            });
        });

        // Add hover effects to buttons
        const buttons = document.querySelectorAll('.btn');
        buttons.forEach(btn => {
            btn.addEventListener('click', (e) => {
                const ripple = document.createElement('span');
                btn.style.position = 'relative';
                btn.style.overflow = 'hidden';
            });
        });
    </script>
</body>
</html>
