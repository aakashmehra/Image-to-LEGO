name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            sidecar_src: dist/cli_convert
            sidecar_dst: cli_convert-aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            sidecar_src: dist/cli_convert.exe
            sidecar_dst: cli_convert-x86_64-pc-windows-msvc.exe

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pillow trimesh numpy pyinstaller

      - name: Build sidecar binary with PyInstaller
        run: pyinstaller cli_convert.spec

      - name: Copy sidecar to Tauri binaries dir
        shell: bash
        run: |
          cp "${{ matrix.sidecar_src }}" \
             "image-to-lego-desktop/src-tauri/binaries/${{ matrix.sidecar_dst }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: image-to-lego-desktop/src-tauri -> target

      - name: Install frontend dependencies
        run: npm install
        working-directory: image-to-lego-desktop

      - name: Build Tauri app
        run: npm run tauri build -- --target ${{ matrix.target }}
        working-directory: image-to-lego-desktop

      - name: Ad-hoc sign the app (macOS)
        if: matrix.os == 'macos-14'
        run: |
          APP=$(find image-to-lego-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/macos -name "*.app" | head -1)
          codesign --deep --force --sign - "$APP"

      - name: Upload macOS DMG
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: Image-to-LEGO-macOS-arm64
          path: image-to-lego-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

      - name: Upload Windows installer
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: Image-to-LEGO-Windows-x64
          path: |
            image-to-lego-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            image-to-lego-desktop/src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
